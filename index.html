<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的演唱会回忆录</title>
    <style>
        /* 1. 基础样式 */
        body {
            margin: 0; padding: 0;
            background-color: #050505; /* 纯黑背景 */
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; /* 防止出现滚动条 */
            height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 2. 霓虹灯标题 */
        .header {
            position: absolute; top: 30px; text-align: center; z-index: 100;
        }
        h1 {
            margin: 0; font-size: 2.5em; color: #fff;
            text-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700, 0 0 30px #ff00de; /* 金色+粉色霓虹 */
            letter-spacing: 2px;
        }
        .subtitle { color: #aaa; margin-top: 5px; font-size: 1em; }

        /* 3. 3D 场景容器 */
        .container {
            width: 100%; height: 80vh;
            perspective: 2000px; /* 【关键】开启 3D 视距，数值越小透视越强烈 */
            display: flex; align-items: center; justify-content: center;
        }

        /* 4. 旋转的轮子 (卡片容器) */
        .carousel {
            width: 300px; height: 400px;
            position: relative;
            transform-style: preserve-3d; /* 【关键】开启 3D 子元素 */
            transition: transform 1s cubic-bezier(0.23, 1, 0.32, 1); /* 流畅旋转 */
            will-change: transform;
        }

        /* 5. 通用卡片样式 */
        .card {
            position: absolute;
            width: 300px; height: 400px;
            left: 0; top: 0;
            background: rgba(255, 255, 255, 0.03); /* 半透明玻璃感 */
            border: 1px solid rgba(255, 215, 0, 0.3); /* 金色边框 */
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex; flex-direction: column;
            backface-visibility: hidden; /* 隐藏背面 */
            transition: box-shadow 0.3s, border 0.3s;
        }
        
        /* 鼠标悬停时的发光效果 */
        .card:hover {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            border: 1px solid #ffd700;
        }

        /* 6. 卡片内部结构 */
        /* 图片区域 */
        .card-photo {
            width: 100%; height: 75%;
            background-size: cover; background-position: center;
            border-bottom: 2px solid #ffd700; /* 金色分割线 */
            position: relative;
        }
        /* 当没有图片时的占位符样式 */
        .card-photo.no-photo {
            background: linear-gradient(135deg, #111 0%, #333 100%);
            display: flex; align-items: center; justify-content: center;
            color: #555; font-size: 4em;
        }

        /* 文字信息区域 */
        .card-info {
            padding: 15px; flex: 1;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .artist { font-size: 1.4em; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .details { font-size: 0.9em; color: #ffd700; opacity: 0.8; }
        .date { font-family: monospace; }

        /* 7. 导航按钮 */
        .nav-buttons {
            position: absolute; bottom: 5vh; display: flex; gap: 20px; z-index: 100;
        }
        button {
            padding: 12px 30px;
            background: transparent;
            border: 2px solid #ffd700; border-radius: 30px;
            color: #ffd700; font-size: 1em; font-weight: bold; cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }
        button:hover {
            background: #ffd700; color: #000;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Concert Memories</h1>
    <p class="subtitle">2023 - 2025 · 点亮了 14 场光芒</p>
</div>

<div class="container">
    <div class="carousel" id="carousel">
        </div>
</div>

<div class="nav-buttons">
    <button onclick="prevCard()">PREV</button>
    <button onclick="nextCard()">NEXT</button>
</div>

<script>
    // 【关键】这里填入你的所有 14 场演唱会数据
    const concerts = [
        { date: '2023.07.08', location: '宜昌', artist: '林志炫', photo: 'phtotos/24cbf8d4c8c60aa6b44a74cb11922911.jpg' }, // photo 填图片路径
        { date: '2024.06.16', location: '青岛', artist: '邓紫棋', photo: '' },
        { date: '2024.09.21', location: '北京', artist: '袁娅维', photo: '' },
        { date: '2024.09.22', location: '北京', artist: '周深', photo: '' },
        { date: '2024.10.05', location: '北京', artist: '国潮星动', photo: '' },
        { date: '2025.03.23', location: '北京', artist: '汪苏泷', photo: '' },
        { date: '2025.03.30', location: '北京', artist: '林志炫', photo: '' },
        { date: '2025.04.18', location: '北京', artist: '张杰', photo: '' },
        { date: '2025.04.20', location: '北京', artist: '李健', photo: '' },
        { date: '2025.06.01', location: '北京', artist: '凤凰传奇', photo: '' },
        { date: '2025.07.27', location: '北京', artist: '五月天', photo: '' },
        { date: '2025.08.15', location: '北京', artist: '王心凌', photo: '' },
        { date: '2025.09.20', location: '北京', artist: '刘雨昕', photo: '' },
        { date: '2025.09.27', location: '北京', artist: '胡夏', photo: '' }
    ];

    const carousel = document.getElementById('carousel');
    const totalCards = concerts.length;
    let currentAngle = 0;
    // 【关键】计算旋转半径。卡片越多，轮子越大。
    const radius = Math.round((280 / 2) / Math.tan(Math.PI / totalCards)) + 150; 

    // 初始化卡片
    function init() {
        concerts.forEach((concert, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // 计算每张卡片的基础旋转角度
            const angle = i * (360 / totalCards);
            // 应用 3D 变换：先旋转，再沿 Z轴 移出 Radius 距离
            card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;

            // 构建卡片 HTML
            let photoHTML = '';
            if(concert.photo) {
                // 如果有图片，显示图片
                photoHTML = `<div class="card-photo" style="background-image: url('${concert.photo}')"></div>`;
            } else {
                // 如果没有图片，显示占位符
                photoHTML = `<div class="card-photo no-photo">🎵</div>`;
            }

            card.innerHTML = `
                ${photoHTML}
                <div class="card-info">
                    <div class="artist">${concert.artist}</div>
                    <div class="details">
                        <span class="date">${concert.date}</span> · 
                        <span class="location">${concert.location}</span>
                    </div>
                </div>
            `;
            carousel.appendChild(card);
        });
    }

    // 旋转到下一张
    function nextCard() {
        currentAngle -= 360 / totalCards;
        applyTransform();
    }
    // 旋转到上一张
    function prevCard() {
        currentAngle += 360 / totalCards;
        applyTransform();
    }
    
    // 应用整体旋转变换
    function applyTransform() {
        // 旋转容器本身，所有子卡片就会跟着转
        carousel.style.transform = `rotateY(${currentAngle}deg)`;
    }

    init();
    
    // 手机端左右划动支持
    let startX = 0;
    window.addEventListener('touchstart', (e) => startX = e.touches[0].clientX);
    window.addEventListener('touchend', (e) => {
        const endX = e.changedTouches[0].clientX;
        if(Math.abs(startX - endX) < 50) return; // 滑动距离太短不触发
        if(endX < startX) nextCard();
        else prevCard();
    });
</script>
</body>
</html>
